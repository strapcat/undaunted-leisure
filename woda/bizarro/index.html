<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIZARRO — WODA</title>
  <meta name="description" content="You have entered the dimensional rift.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Archivo+Black&family=Source+Serif+4:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bizarro-bg: #e85d04;
      --bizarro-text: #0a0a0a;
      --bizarro-shadow: #8B2500;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--bizarro-bg);
      color: var(--bizarro-text);
      overflow-x: hidden;
      padding: 2rem;
    }
    
    /* Grain texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.08;
      pointer-events: none;
      z-index: 1000;
    }
    
    /* ==================== */
    /* ENTRANCE FOG - starts opaque, clears to reveal */
    /* ==================== */
    
    .entrance-fog {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      pointer-events: none;
      overflow: hidden;
    }
    
    .entrance-fog .fog-layer {
      position: absolute;
      width: 400%;
      height: 120%;
      left: -50%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(232, 93, 4, 0.7) 10%,
        rgba(232, 93, 4, 0.95) 25%,
        rgba(232, 93, 4, 1) 40%,
        rgba(232, 93, 4, 1) 60%,
        rgba(232, 93, 4, 0.95) 75%,
        rgba(232, 93, 4, 0.7) 90%,
        transparent 100%
      );
      filter: blur(80px);
      animation: fog-clear 4s ease-out forwards;
    }
    
    .entrance-fog .fog-layer:nth-child(1) { top: -30%; height: 60%; animation-delay: 0s; }
    .entrance-fog .fog-layer:nth-child(2) { top: 0%; height: 70%; animation-delay: 0.1s; }
    .entrance-fog .fog-layer:nth-child(3) { top: 20%; height: 65%; animation-delay: 0.2s; }
    .entrance-fog .fog-layer:nth-child(4) { top: 40%; height: 70%; animation-delay: 0.05s; }
    .entrance-fog .fog-layer:nth-child(5) { top: 60%; height: 60%; animation-delay: 0.15s; }
    .entrance-fog .fog-layer:nth-child(6) { top: 80%; height: 50%; animation-delay: 0.1s; }
    
    @keyframes fog-clear {
      0% {
        transform: translateX(0%);
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
      100% {
        transform: translateX(50%);
        opacity: 0;
      }
    }
    
    /* Return vortex */
    .return-vortex {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 70px;
      height: 70px;
      cursor: pointer;
      z-index: 1001;
      opacity: 0.5;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    
    .return-vortex:hover {
      opacity: 1;
      transform: scale(1.15);
    }
    
    .return-vortex svg {
      width: 100%;
      height: 100%;
      animation: spin-reverse 4s linear infinite;
    }
    
    .return-vortex path {
      fill: none;
      stroke: var(--bizarro-text);
      stroke-width: 3;
      stroke-linecap: round;
    }
    
    @keyframes spin-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    
    /* Main content - ALIGNED WITH WODA PAGE */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    
    /* Logo - same size/position as WODA */
    .logo {
      width: clamp(100px, 20vw, 150px);
      height: clamp(100px, 20vw, 150px);
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 2rem;
      border: 3px solid var(--bizarro-text);
    }
    
    /* Title - BIZARRO in Superman style */
    h1 {
      font-family: 'Bangers', 'Archivo Black', sans-serif;
      font-size: clamp(3.5rem, 14vw, 8rem);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      color: var(--bizarro-text);
      text-shadow: 
        1px 1px 0 var(--bizarro-shadow),
        2px 2px 0 var(--bizarro-shadow),
        3px 3px 0 var(--bizarro-shadow),
        4px 4px 0 var(--bizarro-shadow),
        5px 5px 0 var(--bizarro-shadow),
        6px 6px 0 var(--bizarro-shadow);
      transform: rotate(-1deg);
      animation: title-wobble 5s ease-in-out infinite;
    }
    
    @keyframes title-wobble {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(-1.5deg); }
    }
    
    .tagline {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 2rem;
    }
    
    .message {
      font-family: 'Bangers', cursive;
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      line-height: 1.6;
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }
    
    .quote {
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }
    
    .coming {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.5;
    }
    
    /* ==================== */
    /* EXIT TRANSITION (back to WODA) */
    /* ==================== */
    
    .exit-fog {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      pointer-events: none;
      overflow: hidden;
      visibility: hidden;
    }
    
    body.transitioning .exit-fog {
      visibility: visible;
    }
    
    .exit-fog .fog-layer {
      position: absolute;
      width: 400%;
      height: 120%;
      left: -150%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(10, 10, 10, 0.7) 10%,
        rgba(10, 10, 10, 0.95) 25%,
        rgba(10, 10, 10, 1) 40%,
        rgba(10, 10, 10, 1) 60%,
        rgba(10, 10, 10, 0.95) 75%,
        rgba(10, 10, 10, 0.7) 90%,
        transparent 100%
      );
      filter: blur(80px);
      opacity: 0;
    }
    
    body.transitioning .exit-fog .fog-layer {
      animation: fog-exit 5s ease-in-out forwards;
    }
    
    .exit-fog .fog-layer:nth-child(1) { top: -30%; height: 60%; animation-delay: 0s; }
    .exit-fog .fog-layer:nth-child(2) { top: 0%; height: 70%; animation-delay: 0.15s; }
    .exit-fog .fog-layer:nth-child(3) { top: 20%; height: 65%; animation-delay: 0.3s; }
    .exit-fog .fog-layer:nth-child(4) { top: 40%; height: 70%; animation-delay: 0.1s; }
    .exit-fog .fog-layer:nth-child(5) { top: 60%; height: 60%; animation-delay: 0.25s; }
    .exit-fog .fog-layer:nth-child(6) { top: 80%; height: 50%; animation-delay: 0.2s; }
    
    @keyframes fog-exit {
      0% {
        transform: translateX(0%);
        opacity: 0;
      }
      25% {
        opacity: 0.8;
      }
      50% {
        transform: translateX(25%);
        opacity: 1;
      }
      75% {
        opacity: 1;
      }
      100% {
        transform: translateX(50%);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <!-- Entrance fog - clears on load -->
  <div class="entrance-fog">
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
  </div>
  
  <!-- Exit fog (back to WODA) -->
  <div class="exit-fog">
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
  </div>
  
  <!-- Return Vortex -->
  <a href="/woda/" class="return-vortex" id="returnVortex" title="Return to WODA">
    <svg viewBox="0 0 100 100">
      <path d="M50 10 
               A40 40 0 0 1 90 50 
               A35 35 0 0 1 50 85 
               A30 30 0 0 1 20 50 
               A25 25 0 0 1 50 25
               A20 20 0 0 1 70 50
               A15 15 0 0 1 50 65
               A10 10 0 0 1 40 50
               A5 5 0 0 1 50 45"/>
    </svg>
  </a>
  
  <main class="hero">
    <img src="../../images/fox-ringmaster-head.jpg" alt="The Ringmaster" class="logo">
    
    <h1>BIZARRO</h1>
    <p class="tagline">World Outdoor Darts Association</p>
    
    <p class="message">
      You have entered the dimensional rift to Bizarro World.
    </p>
    
    <p class="quote">
      "It's a whole world of imperfect darts… a world where wrong is right and right is wrong."
    </p>
    
    <p class="coming">
      Bizarro Cricket rules coming soon
    </p>
  </main>
  
  <script>
    document.getElementById('returnVortex').addEventListener('click', function(e) {
      e.preventDefault();
      document.body.classList.add('transitioning');
      
      // Navigate AFTER fog is fully opaque
      setTimeout(function() {
        window.location.href = '/woda/';
      }, 2800);
    });
  </script>
</body>
</html>
